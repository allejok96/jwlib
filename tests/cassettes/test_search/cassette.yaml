        to Bible Understanding\",\"title\":\"Chelal\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":341,\"lank\":\"pa-1200010921\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1101990066&prefer=lang&wtlocale=E\",\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1101990066&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1101990066\",\"context\":\"\u201CAll
        Scripture Is Inspired of God and Beneficial\u201D\",\"title\":\"Bible Book
        Number 5\u2014Deuteronomy\",\"snippet\":\"For their lack of faith, Jehovah
        told that evil generation that none of them, except <strong>Caleb</strong>
        and Joshua, would see the good land.\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":342,\"lank\":\"pa-1101990066\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1102017007&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1102017007\",\"context\":\"Examining
        the Scriptures Daily\u20142017\",\"title\":\"August\",\"snippet\":\"This was
        true of <strong>Caleb</strong> and Joshua. They showed faith in Jehovah when
        they spied out the Promised Land. However, as they saw Jehovah\u2019s direction
        at each turn in their life thereafter, their faith grew even more.\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":343,\"lank\":\"pa-1102017007\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1101976034&prefer=lang&wtlocale=E\",\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1101976034&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1101976034\",\"context\":\"Holy
        Spirit\u2014The Force Behind the Coming New Order!\",\"title\":\"Holy Spirit
        in Action upon Persons of Earlier Times\",\"snippet\":\"Then Jehovah raised
        a savior up for the sons of Israel that he might save them, Othniel the son
        of Kenaz, the younger brother of <strong>Caleb</strong>. What took place now?
        \u201CThe spirit of Jehovah now came upon him, and he became the judge of
        Israel.\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":344,\"lank\":\"pa-1101976034\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1200004211&prefer=lang&wtlocale=E\",\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1200004211&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1200004211\",\"context\":\"Insight
        on the Scriptures\",\"title\":\"Spirit\",\"snippet\":\"The basic sense of
        a force that moves and gives \u201Cdrive\u201D or \u201Cthrust\u201D to one\u2019s
        actions and speech is also seen in the reference to Joshua as \u201Ca man
        in whom there is spirit\u201D (Nu 27:18), and to <strong>Caleb</strong> as
        demonstrating \u201Ca different spirit\u201D from that of the majority of
        the Israelites who had become demoralized\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":345,\"lank\":\"pa-1200004211\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1200014114&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1200014114\",\"context\":\"Aid
        to Bible Understanding\",\"title\":\"Spirit\",\"snippet\":\"The basic sense
        of a force that moves and gives \u201Cdrive\u201D or \u201Cthrust\u201D to
        one\u2019s actions and speech is also seen in the reference to Joshua as \u201Ca
        man in whom there is spirit\u201D (Num. 27:18), and to <strong>Caleb</strong>
        as demonstrating a \u201Cdifferent spirit\u201D from that of the majority
        of the Israelites who had become demoralized\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":346,\"lank\":\"pa-1200014114\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=1200010959&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-1200010959\",\"context\":\"Aid
        to Bible Understanding\",\"title\":\"Chronology\",\"snippet\":\"(Josh. 23:1;\_24:29-31)
        This is seen from the following facts:\\nSince he and <strong>Caleb</strong>
        gave a faithful report after the spying trip, Joshua was exempt from the divine
        judgment sentencing those twenty years old and upward to die in the wilderness.\",\"image\":{\"type\":\"sqs\"},\"insight\":{\"rank\":347,\"lank\":\"pa-1200010959\"}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=301979004&prefer=lang&wtlocale=E\",\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=301979004&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-301979004\",\"context\":\"1979
        Yearbook of Jehovah\u2019s Witnesses\",\"title\":\"Canada\",\"snippet\":\"No

      string: "{\"layout\":[\"grid\",\"videos\"],\"results\":[{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=503000119&prefer=lang&wtlocale=E\"},\"deepLinks\":[],\"lank\":\"pub-ljf_6_VIDEO\",\"title\":\"Learn
        From Jehovah\u2019s Friends\u2014Joshua and Caleb\",\"snippet\":\"What did
        Joshua and <strong>Caleb</strong> do to become Jehovah\u2019s friends? When
        have you been afraid of something\",\"image\":{\"type\":\"lss\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/503000119/univ/art/503000119_univ_lss_lg.jpg\"},\"duration\":\"2:40\",\"insight\":{\"rank\":1,\"lank\":\"pub-ljf_6_VIDEO\"}},{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1102014323&prefer=lang&wtlocale=E\"},\"deepLinks\":[],\"lank\":\"pub-pk_12_VIDEO\",\"title\":\"Caleb
        and Sophia Visit Bethel\",\"snippet\":\"Hey, <strong>Caleb</strong>,\\ndo
        you remember our trip to Bethel? We got to go to Bethel,\\nand I\u2019m really,
        really glad.\",\"image\":{\"type\":\"lss\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/1102014323/univ/art/1102014323_univ_lss_lg.jpg\"},\"duration\":\"1:46\",\"insight\":{\"rank\":2,\"lank\":\"pub-pk_12_VIDEO\"}},{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-125_6_VIDEO&wtlocale=E&appLanguage=E&prefer=content\"},\"deepLinks\":[{\"title\":\"\",\"jumpLabel\":\"Jump
        to 5:26\",\"snippet\":\"Now, <strong>Caleb</strong> has a personal promise:\",\"urls\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-125_6_VIDEO&wtlocale=E&appLanguage=E&prefer=content&ts=326.764\"},\"insight\":{\"rank\":3,\"lank\":\"pub-jwb-125_6_VIDEO\"}},{\"title\":\"\",\"jumpLabel\":\"Jump
        to 0:01\",\"snippet\":\"And in the crowd is an older, seasoned, spiritual
        man, <strong>Caleb</strong>. Now, Deuteronomy chapter 1 records what Moses
        recalls at that time.\",\"urls\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-125_6_VIDEO&wtlocale=E&appLanguage=E&prefer=content&ts=1.9809999999999999\"},\"insight\":{\"rank\":3,\"lank\":\"pub-jwb-125_6_VIDEO\"}}],\"lank\":\"pub-jwb-125_6_VIDEO\",\"title\":\"Jeremy
        Clarke: Recall Eshcol\",\"snippet\":\"Now, <strong>Caleb</strong> has a personal
        promise:\",\"image\":{\"type\":\"lss\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/jwb-125/univ/art/jwb-125_univ_lss_06_lg.jpg\"},\"duration\":\"11:28\",\"insight\":{\"rank\":3,\"lank\":\"pub-jwb-125_6_VIDEO\"}},{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=501600169&prefer=lang&wtlocale=E\"},\"deepLinks\":[],\"lank\":\"pub-pk_58_VIDEO\",\"title\":\"Become
        Jehovah\u2019s Friend Preview: Jehovah Is a Real Person\",\"image\":{\"type\":\"lss\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/501600169/univ/art/501600169_univ_lss_lg.jpg\"},\"duration\":\"0:51\",\"insight\":{\"rank\":4,\"lank\":\"pub-pk_58_VIDEO\"}},{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=501600162&prefer=lang&wtlocale=E\"},\"deepLinks\":[],\"lank\":\"pub-pk_56_VIDEO\",\"title\":\"You
        Could Pioneer!\",\"snippet\":\"That\u2019s wonderful, <strong>Caleb</strong>.\",\"image\":{\"type\":\"lss\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/501600162/univ/art/501600162_univ_lss_lg.jpg\"},\"duration\":\"2:33\",\"insight\":{\"rank\":5,\"lank\":\"pub-pk_56_VIDEO\"}},{\"type\":\"item\",\"subtype\":\"video\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-089_16_VIDEO&wtlocale=E&appLanguage=E&prefer=content\"},\"deepLinks\":[{\"title\":\"\",\"jumpLabel\":\"Jump
        to 4:10\",\"snippet\":\"After watching <strong>Caleb\u2019s</strong> father
        lovingly talking to <strong>Caleb</strong>\\nand seeing <strong>Caleb</strong>
        listening when his father used Bible characters to teach <strong>Caleb</strong>,
        I tried it with\",\"urls\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-089_16_VIDEO&wtlocale=E&appLanguage=E&prefer=content&ts=250.896\"},\"insight\":{\"rank\":6,\"lank\":\"pub-jwb-089_16_VIDEO\"}},{\"title\":\"\",\"jumpLabel\":\"Jump
        to 0:53\",\"snippet\":\"Well, one clever idea was to have\\n<strong>Caleb</strong>
        portrayed as a small boy with a big, vivid imagination.\",\"urls\":{\"jw.org\":\"https://www.jw.org/open?docid=1011214&item=pub-jwb-089_16_VIDEO&wtlocale=E&appLanguage=E&prefer=content&ts=53.157\"},\"insight\":{\"rank\":6,\"lank\":\"pub-jwb-089_16_VIDEO\"}}],\"lank\":\"pub-jwb-089_16_VIDEO\",\"title\":\"A
        Decade of Animated Bible Lessons\",\"snippet\":\"After watching <strong>Caleb\u2019s</strong>

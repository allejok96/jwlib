        approval. They told the people: \u201CIf Jehovah is pleased with us, he will
        certainly bring us into this land and give it to us.\u201D\u200B\u2014Num.
        14:6-9.\\n 7. How can we strengthen our fear of Jehovah? (See also picture.)\",\"image\":{\"type\":\"sqs\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/2024481/univ/art/2024481_univ_sqs_lg.jpg\",\"altText\":\"Joshua
        and Caleb pleading with angry Israelites who are about to stone them. The
        pillar of cloud is in the background.\"},\"insight\":{\"rank\":60,\"lank\":\"pa-2024481\",\"group\":{\"rank\":4,\"key\":\"all\",\"itemRank\":11}}},{\"type\":\"item\",\"subtype\":\"article\",\"links\":{\"jw.org\":\"https://www.jw.org/open?docid=2024285&prefer=lang&wtlocale=E\",\"wol\":\"https://wol.jw.org/wol/finder?wtlocale=E&docid=2024285&q=Caleb&p=doc&srcid=sch&srctype=jwo\"},\"lank\":\"pa-2024285\",\"context\":\"THE
        WATCHTOWER\u2014STUDY EDITION\",\"title\":\"Keep Following Jehovah\u2019s
        Guidance\",\"snippet\":\"For example, Jehovah noted: \u201C<strong>Caleb</strong>
        .\_.\_. kept following after me wholeheartedly.\u201D (Read Numbers 14:24.)
        God rewarded <strong>Caleb</strong>, even granting him his preferred choice
        of land in Canaan. (Josh. 14:12-14) The next generation of Israelites also
        set a good example in following Jehovah\u2019s guidance.\",\"image\":{\"type\":\"sqs\",\"url\":\"https://cms-imgp.jw-cdn.org/img/p/2024285/univ/art/2024285_univ_sqs_lg.jpg\",\"altText\":\"A
        large group of Israelite men, women, and children following the pillar of
        cloud in the wilderness.\"},\"insight\":{\"rank\":64,\"lank\":\"pa-2024285\",\"group\":{\"rank\":4,\"key\":\"all\",\"itemRank\":12}}}]}],\"messages\":[],\"insight\":{\"query\":\"Caleb\",\"filter\":\"all\",\"sort\":\"newest\",\"offset\":0,\"page\":1,\"total\":{\"value\":501,\"relation\":\"eq\"}},\"pagination\":{\"label\":\"Showing
